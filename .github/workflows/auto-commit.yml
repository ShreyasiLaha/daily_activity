name: Daily Auto Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make 10 commits
        run: |
          git config --local user.name "ShreyasiLaha"
          git config --local user.email "shreyasilaha.it224106@bppimt.ac.in"
          
          for i in {1..10}; do
            echo "$(date) - Commit #$i" >> activity_$i.txt
            git add activity_$i.txt
            git commit -m "Daily commit #$i - $(date)"
          done

      - name: Push changes
        run: git push
